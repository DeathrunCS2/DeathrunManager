name: Release

env:
  APP_NAME: "DeathrunManager"
  BASE_MODULE_PROJECT_PATH: "src/DeathrunManager/DeathrunManager.csproj"
  SHARED_PROJECT_PATH: "src/DeathrunManager.Shared/DeathrunManager.Shared.csproj"
  
  BASE_MODULE_OUTPUT_PATH: "game/sharp/modules/Deathrun.Manager"
  SHARED_OUTPUT_PATH: "game/sharp/shared/DeathrunManager.Shared"
  
  DOTNET_VERSION: '10.0.x'  # .NET 10.0
  CONFIGURATION: Release

on:
  push:
    if: contains(github.event.head_commit.message, 'plugin')
  
  #   push:
  #     branches:
  #       - master  # Run on pushes to master branch
  #       - refs
  #       - heads
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for creating releases
      packages: write  # Required for publishing to GitHub Packages

    steps:

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: '0'
      #
      - name: Versioning
        id: build_version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' ./src/Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Build Version: $VERSION"

          CURRENT_VERSION=$VERSION
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"

          echo "minor_version=$minor" >> $GITHUB_OUTPUT
          echo "Minor Version: $minor"
          
          COMMIT_HASH=${{ github.sha }}
          echo "commit_hash_short=${COMMIT_HASH:0:7}" >> $GITHUB_OUTPUT
          echo "Commit ID: ${COMMIT_HASH:0:7}"
      #
      - name: Setup .NET 10 (preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      #
      - name: Restore dependencies
        run: dotnet restore
      #      
      - name: Compile Module
        run: |
          dotnet publish $BASE_MODULE_PROJECT_PATH --configuration ${{ env.CONFIGURATION }} --no-restore --output $BASE_MODULE_OUTPUT_PATH \
          -p:Version=${{ steps.build_version.outputs.version }} \
          -p:InformationalVersion=${{ steps.build_version.outputs.commit_hash_short }}
          dotnet publish $SHARED_PROJECT_PATH --configuration ${{ env.CONFIGURATION }} --no-restore --output $SHARED_OUTPUT_PATH \
          -p:Version=${{ steps.build_version.outputs.version }} \
          -p:InformationalVersion=${{ steps.build_version.outputs.commit_hash_short }}
      
      #      
      - name: Copy assets
        run: |
          if [ -d .asset/game ]; then
            cp -r .asset/game/* game/sharp
            echo "Assets copied to game/"
          else
            echo "No assets found, skipping..."
          fi
      
      #      
      - name: Create archives
        run: |
          cd game
          tar -czf ../DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}.tar.gz sharp/
          cd ..
          zip -r DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}.zip game/sharp/
      
      #      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}
          path: |
            game/sharp/modules/Deathrun.Manager/
            game/sharp/shared/DeathrunManager.Shared/
      #

      - name: Get changelog starting point
        id: changelog_starting_point
        if: ${{ steps.build_version.outputs.minor_version >= 1}}
        run: |
          PREVIUS_MINOR_VERSION="$major.$((minor - 1)).$patch"

          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "previous=$PREVIUS_MINOR_VERSION" >> $GITHUB_OUTPUT
          
          echo "Current minor version: $CURRENT_VERSION"
          echo "Previous minor version: $PREVIUS_MINOR_VERSION"
          
          TARGET_VERSION=$PREVIUS_MINOR_VERSION
          
          git fetch --tags

          LOWEST=build$(git tag | \
            grep -E "^${TARGET_VERSION}build[0-9]+$" | \
            sed -E 's/.*build([0-9]+)/\1/' | \
            sort -n | \
            head -n 1)
          
          echo "build=$LOWEST" >> $GITHUB_OUTPUT
          echo "full=$TARGET_VERSION$LOWEST" >> $GITHUB_OUTPUT
          
          echo "Oldest build: $LOWEST | For minor version: $TARGET_VERSION"
      
      #      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.build_version.outputs.minor_version >= 1
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('{0}build{1}', steps.build_version.outputs.version, github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('{0}build{1}', steps.build_version.outputs.version, github.run_number) }}
          files: |
            DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}.tar.gz
            DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}.zip     
          body:
            Changelog: https://github.com/aquevadis/ms-cs2deathrun-public/compare/${{ steps.changelog_starting_point.outputs.full }}...${{ format('{0}build{1}', steps.build_version.outputs.version, github.run_number) }}
          draft: false
          prerelease: false
          make_latest: true
        if: steps.build_version.outputs.minor_version == 0
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('{0}build{1}', steps.build_version.outputs.version, github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('{0}build{1}', steps.build_version.outputs.version, github.run_number) }}
          files: |
            DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}.tar.gz
            DeathrunManager${{ steps.build_version.outputs.version }}-build${{ github.run_number }}.zip     
          body:
            Changelog: https://github.com/aquevadis/ms-cs2deathrun-public/compare/${{ steps.changelog_starting_point.outputs.full }}...${{ format('{0}build{1}', steps.build_version.outputs.version, github.run_number) }}
          draft: false
          prerelease: false
          make_latest: true

      - name: Build Nuget library
        run: dotnet pack src/DeathrunManager.Shared/DeathrunManager.Shared.csproj --configuration Release --output .build/nuget

      - name: Publish new version
        if: ${{ startsWith(github.event.head_commit.message, 'push module v') || startsWith(github.event.head_commit.message, 'push module + api v') }}
        run: dotnet nuget push .build/nuget/DeathrunManager.Shared.${{ steps.build_version.outputs.version }}.nupkg --skip-duplicate --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json